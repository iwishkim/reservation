<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당 예약 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ 식당 예약 시스템</h1>
            <p>원하는 시간에 좌석을 예약하세요</p>
        </header>

        <main>
            <!-- 예약 폼 섹션 -->
            <section class="booking-form">
                <h2>예약하기</h2>
                <form id="reservationForm">
                    <div class="form-group">
                        <label for="name">이름 *</label>
                        <input type="text" id="name" placeholder="예약자 이름" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">전화번호 *</label>
                        <input type="tel" id="phone" placeholder="010-1234-5678" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">예약 날짜 *</label>
                            <input type="date" id="date" required>
                        </div>

                        <div class="form-group">
                            <label for="time">예약 시간 *</label>
                            <select id="time" required>
                                <option value="">선택하세요</option>
                                <option value="11:00">11:00</option>
                                <option value="11:30">11:30</option>
                                <option value="12:00">12:00</option>
                                <option value="12:30">12:30</option>
                                <option value="13:00">13:00</option>
                                <option value="17:00">17:00</option>
                                <option value="17:30">17:30</option>
                                <option value="18:00">18:00</option>
                                <option value="18:30">18:30</option>
                                <option value="19:00">19:00</option>
                                <option value="19:30">19:30</option>
                                <option value="20:00">20:00</option>
                                <option value="20:30">20:30</option>
                                <option value="21:00">21:00</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="guests">인원 수 *</label>
                            <select id="guests" required>
                                <option value="">선택하세요</option>
                                <option value="1">1명</option>
                                <option value="2">2명</option>
                                <option value="3">3명</option>
                                <option value="4">4명</option>
                                <option value="5">5명</option>
                                <option value="6">6명</option>
                                <option value="7">7명</option>
                                <option value="8">8명</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="restaurant">식당 선택 *</label>
                            <select id="restaurant" required>
                                <option value="">선택하세요</option>
                                <option value="Italian Place">이탤리언 플레이스</option>
                                <option value="Korean BBQ">한우 BBQ</option>
                                <option value="Sushi Bar">스시 바</option>
                                <option value="French Bistro">프렌치 비스트로</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">특별 요청사항</label>
                        <textarea id="notes" placeholder="예: 창가 자리, 생일 파티 등" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">예약 신청</button>
                </form>
            </section>

            <!-- 예약 목록 섹션 -->
            <section class="booking-list">
                <h2>예약 현황</h2>
                <div id="reservationsList" class="reservations-container">
                    <p class="empty-message">아직 예약이 없습니다.</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 식당 예약 시스템. 모든 권리 보유.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
